<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:30px;
        }

        h2{
            text-align:center;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            box-sizing:border-box;
        }

        button{
            padding:10px 15px;
            margin-top:10px;
            cursor:pointer;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            background:#eee;
            padding:12px;
            margin-top:10px;
            border-radius:6px;
        }

        .actions{
            margin-top:10px;
        }

        .actions button{
            margin-right:10px;
        }

        #count{
            color:blue;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Student Management System</h2>

<input
type="text"
id="search"
placeholder="Search by Name, Roll or Department..."
onkeyup="loadStudents()">

<input
type="text"
id="name"
placeholder="Student Name">

<input
type="text"
id="roll"
placeholder="Roll Number">

<input
type="text"
id="department"
placeholder="Department">

<input
type="email"
id="email"
placeholder="Email">

<button onclick="addStudent()">Save Student</button>

<p>Total Students :
<span id="count">0</span>
</p>

<ul id="list"></ul>

</div>

<script>

let editId = null;

async function loadStudents(){

    let res = await fetch("/students");

    let data = await res.json();

    let keyword = document
        .getElementById("search")
        .value
        .toLowerCase();

    data = data.filter(student =>

        student.name.toLowerCase().includes(keyword) ||

        student.roll.toLowerCase().includes(keyword) ||

        student.department.toLowerCase().includes(keyword)

    );

    document.getElementById("count").innerText = data.length;

    let output="";

    data.forEach(student=>{

        output += `

        <li>

        <b>${student.name}</b><br>

        Roll Number : ${student.roll}<br>

        Department : ${student.department}<br>

        Email : ${student.email}

        <div class="actions">

        <button onclick="editStudent(
        '${student._id}',
        '${student.name}',
        '${student.roll}',
        '${student.department}',
        '${student.email}'
        )">

        Edit

        </button>

        <button onclick="deleteStudent('${student._id}')">

        Delete

        </button>

        </div>

        </li>

        `;

    });

    document.getElementById("list").innerHTML = output;

}

async function addStudent(){

    let name=document.getElementById("name").value.trim();

    let roll=document.getElementById("roll").value.trim();

    let department=document.getElementById("department").value.trim();

    let email=document.getElementById("email").value.trim();

    if(name=="" || roll=="" || department=="" || email==""){

        alert("Please fill all fields");

        return;

    }

    if(editId){

        await fetch("/students/"+editId,{

            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name,
                roll,
                department,
                email

            })

        });

        editId=null;

    }

    else{

        await fetch("/students",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                name,
                roll,
                department,
                email

            })

        });

    }

    document.getElementById("name").value="";
    document.getElementById("roll").value="";
    document.getElementById("department").value="";
    document.getElementById("email").value="";

    loadStudents();

}

function editStudent(id,name,roll,department,email){

    editId=id;

    document.getElementById("name").value=name;
    document.getElementById("roll").value=roll;
    document.getElementById("department").value=department;
    document.getElementById("email").value=email;

}

async function deleteStudent(id){

    if(!confirm("Are you sure you want to delete this student?"))
        return;

    await fetch("/students/"+id,{
        method:"DELETE"
    });

    loadStudents();

}

loadStudents();

</script>

</body>
</html>
